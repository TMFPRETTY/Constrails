services:
  constrails:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -lc "pip install -e . && constrail serve --host 0.0.0.0 --port 8000"
    volumes:
      - ../../:/app
    env_file:
      - .env
    environment:
      AGENT_API_KEY: dev-agent
      ADMIN_API_KEY: dev-admin
      AGENT_TENANT_ID: default
      AGENT_NAMESPACE: dev
      OPA_URL: http://opa:8181
    ports:
      - "8000:8000"
    depends_on:
      - opa

  opa:
    image: openpolicyagent/opa:latest
    command:
      - run
      - --server
      - /policies/rego
    volumes:
      - ../../policies:/policies:ro
    ports:
      - "8181:8181"
